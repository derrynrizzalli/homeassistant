# Example configuration.yaml entry with manually specified Sonos IP addresses

# Lovelace dashboards configuration added by AI Agent
lovelace:
  dashboards:
    climate-air-quality:
      mode: yaml
      title: Climate & Air Quality Dashboard
      icon: mdi:weather-partly-cloudy
      show_in_sidebar: true
      filename: ui-lovelace-climate-air-quality.yaml