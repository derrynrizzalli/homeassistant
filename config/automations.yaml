- id: ai_agent_auto_1777415262678
  alias: Water Indoor Plants - Low Moisture Alert
  description: Creates a persistent notification when soil moisture drops below 30%.
  triggers:
  - below: 35
    entity_id:
    - sensor.wn1820c_soil_moisture_1
    trigger: numeric_state
  conditions: []
  actions:
  - data:
      message: Your indoor plant's soil moisture is below 30%. It's time to water!
      notification_id: plant_water_reminder
      title: Plant Watering Reminder
    action: persistent_notification.create
  mode: single
- id: '1778016873294'
  alias: Living Room / Lounge Switch Scene Switcher
