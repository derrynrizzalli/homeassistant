      light_target:
        entity_id: light.laundry_light
      motion_entity: binary_sensor.laundry_sensor_motion
      no_motion_wait: 180
    path: homeassistant/motion_light.yaml
- alias: Pantry Motion LIght
  description: ''
  id: '1767680635261'
  use_blueprint:
    input:
      light_target:
        entity_id: light.pantry_light
      motion_entity: binary_sensor.pantry_sensor_motion
    path: homeassistant/motion_light.yaml
- actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - leave
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.home
      - action: media_player.turn_off
        target:
          entity_id: media_player.sony_bravia_7
      - action: fan.set_percentage
        data:
          percentage: 100
        target:
          entity_id: fan.air_purifier
      - delay: 03:00:00
      - action: fan.set_preset_mode
        data:
          preset_mode: auto
        target:
          entity_id: fan.air_purifier
    - conditions:
      - condition: trigger
        id:
        - enter
      sequence:
      - if:
        - condition: state
          entity_id: fan.air_purifier
          state: 'on'
        - above: 99
          attribute: percentage
          condition: numeric_state
          entity_id: fan.air_purifier
        then:
        - action: fan.set_preset_mode
          data:
            preset_mode: auto
          target:
            entity_id: fan.air_purifier
      - if:
        - after: sunset
          condition: sun
        then:
        - action: light.turn_on
          data:
            scene: Lake Placid
          target:
            entity_id: light.home
    default: []
  alias: Home Presence Routine
  conditions: []
  description: Manages home state based on presence. Turns off all lights and TV when
    away, sets air purifier to 10
  id: '1768385363238'
  mode: single
  triggers:
  - entity_id: device_tracker.rizzas_iphone
    event: leave
    id: leave
    trigger: zone
    zone: zone.home
  - entity_id: device_tracker.rizzas_iphone
    event: enter
    id: enter
    trigger: zone
    zone: zone.home
- action:
  - service: light.turn_off
    target:
      entity_id:
