- id: unifi_protect_lights_on
  alias: Unifi Protect - Security Trigger
  description: Triggered by Unifi Protect webhook. Turns on balcony lights for 2 minutes.
  triggers:
  - trigger: webhook
    webhook_id: unifi_protect_security
    allowed_methods:
    - GET
    - PUT
    - POST
    - HEAD
    local_only: false
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.hue_lightstrip_outdoor_1
      - light.floor_lamp
      - light.desk_lamp
    data: {}
  - delay:
      minutes: 2
  - action: light.turn_off
    target:
      entity_id:
      - light.hue_lightstrip_outdoor_1
      - light.floor_lamp
      - light.desk_lamp
  mode: single
