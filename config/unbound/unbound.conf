server:
    # Listen on all interfaces (IPv4 + IPv6)
    interface: 0.0.0.0
    interface: ::0
    port: 5353

    # Access control
    access-control: 0.0.0.0/0 allow
    access-control: ::0/0 allow

    # Enable IPv6 support
    do-ip6: yes
    prefer-ip6: no

    # Performance tuning
    num-threads: 2
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4

    # Cache sizes
    rrset-cache-size: 100m
    msg-cache-size: 50m

    # Prefetch popular records before TTL expires
    prefetch: yes

    # Serve stale cache on upstream failure
    serve-expired: yes
    serve-expired-ttl: 86400

    # Persistent TLS connections to upstream
    tcp-upstream: yes

    # Privacy
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes

    # Security
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    use-caps-for-id: yes

    # TLS settings
    tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

    # Logging (reduce for production)
    verbosity: 1
    log-queries: no
    log-replies: no
    use-syslog: yes
    logfile: ""

    # EDNS
    edns-buffer-size: 1232
    answer-cookie: no

forward-zone:
    name: "."
    forward-tls-upstream: yes
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com
    forward-addr: 2606:4700:4700::1111@853#cloudflare-dns.com
    forward-addr: 2606:4700:4700::1001@853#cloudflare-dns.com
    
remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-use-cert: no